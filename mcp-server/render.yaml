# Render blueprint for the Core Quest MCP server.
# Deploy: connect the kingrei76/core-quest repo in Render and point at this
# blueprint, or create a Web Service with rootDir=mcp-server. Set the secret
# env vars (marked sync:false) in the Render dashboard.
services:
  - type: web
    name: core-quest-mcp
    runtime: node
    plan: free
    rootDir: mcp-server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    branch: claude/task-management-research-AKtam
    envVars:
      - key: SUPABASE_URL
        value: https://yatgxollnwplztbnrfjx.supabase.co
      - key: CORE_QUEST_USER_ID
        value: ec5578ec-aacb-4138-bde6-e3586adc3fb4
      - key: USER_TZ
        value: America/New_York
      - key: APP_URL
        value: https://core-quest.vercel.app
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: MCP_SHARED_SECRET
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
